<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>GrowThai</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0814;color:#f0e8d0}
body{display:flex;flex-direction:column}
.top-bar{padding:12px 16px 8px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid #C8951A33}
.top-bar h1{font-size:17px;font-weight:700;color:#E8B020;letter-spacing:.5px}
.lv-select{display:flex;gap:4px}
.lv-btn{padding:5px 10px;border-radius:14px;border:1.5px solid #C8951A44;background:transparent;color:#9a8a6a;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s}
.lv-btn.on{border-color:#E8B020;color:#E8B020;background:#1a1000}
.sentence-bar{padding:10px 16px;min-height:52px;border-bottom:1px solid #ffffff10;display:flex;align-items:center;flex-wrap:wrap;gap:4px;flex-shrink:0;transition:background .5s}
.sentence-bar.complete{background:#0d1f0d;border-bottom-color:#4ade8033}
.sent-word{display:inline-flex;flex-direction:column;align-items:center;padding:3px 8px;border-radius:8px}
.sent-word .sw-t{font-size:17px;color:#f0e8d0}
.sent-word .sw-p{font-size:9px;color:#E8B020}
.sent-word .sw-e{font-size:8px;color:#9a8a6a}
.badge{font-size:10px;color:#4ade80;font-weight:700;margin-left:auto;white-space:nowrap;opacity:0;transition:opacity .4s}
.sentence-bar.complete .badge{opacity:1}
.grow-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 100px;display:flex;flex-direction:column;align-items:center}
.depth-row{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:6px;width:100%}
.conn{width:2px;height:14px;background:#c8dce830;flex-shrink:0;margin:0 auto}
.node{display:flex;flex-direction:column;align-items:center;padding:14px 16px 10px;border-radius:20px;cursor:pointer;transition:all .3s ease;border:2px solid transparent;min-width:76px;text-align:center;touch-action:manipulation;position:relative}
.node:active{transform:scale(.94)}
.node .nt{font-size:22px;font-weight:600;line-height:1.2}
.node .np{font-size:10px;margin-top:3px;opacity:.8}
.node .ne{font-size:9px;margin-top:2px;max-height:0;overflow:hidden;opacity:0;transition:max-height .3s,opacity .3s}
.node.revealed .ne{max-height:30px;opacity:1}
.node .ns{font-size:7px;text-transform:uppercase;letter-spacing:.1em;margin-top:4px;opacity:.35}
.node.s-subject{background:#2a1800;border-color:#C8951A55}.node.s-subject .nt{color:#E8B020}.node.s-subject .np{color:#C8951A}
.node.s-time{background:#1a1a08;border-color:#fbbf2444}.node.s-time .nt{color:#fbbf24}.node.s-time .np{color:#d4a020}
.node.s-condition{background:#201008;border-color:#E8B02044}.node.s-condition .nt{color:#E8B020}.node.s-condition .np{color:#C8951A}
.node.s-qstart{background:#200820;border-color:#e878a844}.node.s-qstart .nt{color:#e878a8}.node.s-qstart .np{color:#c06088}
.node.s-preverb{background:#1a0820;border-color:#c084fc44}.node.s-preverb .nt{color:#c084fc}.node.s-preverb .np{color:#a06adc}
.node.s-verb{background:#081a20;border-color:#60b0e844}.node.s-verb .nt{color:#c8dce8}.node.s-verb .np{color:#80b0cc}
.node.s-object{background:#0a1a10;border-color:#4ade8044}.node.s-object .nt{color:#6ee87a}.node.s-object .np{color:#4abe60}
.node.s-qobject{background:#200820;border-color:#e878a844}.node.s-qobject .nt{color:#e878a8}.node.s-qobject .np{color:#c06088}
.node.s-qend{background:#200820;border-color:#e878a844}.node.s-qend .nt{color:#e878a8}.node.s-qend .np{color:#c06088}
.node.s-adj{background:#1a100a;border-color:#fb923c44}.node.s-adj .nt{color:#fb923c}.node.s-adj .np{color:#d07830}
.node.s-degree{background:#1a100a;border-color:#fb923c33}.node.s-degree .nt{color:#d07830}.node.s-degree .np{color:#b06020}
.node.s-postverb{background:#101018;border-color:#9090c044}.node.s-postverb .nt{color:#b0b0e0}.node.s-postverb .np{color:#8888b0}
.node.s-preposition{background:#0a1820;border-color:#5ac8e844}.node.s-preposition .nt{color:#5ac8e8}.node.s-preposition .np{color:#40a0c0}
.node.s-final{background:#200a18;border-color:#e878a844}.node.s-final .nt{color:#e878a8}.node.s-final .np{color:#c06088}
.node.s-conjunction{background:#20180a;border-color:#E8B02055}.node.s-conjunction .nt{color:#E8B020}.node.s-conjunction .np{color:#C8951A}
.node .ne{color:#9a8a6a}
.node.chosen{transform:scale(1.05);box-shadow:0 0 16px #4ade8030;z-index:2;border-color:#4ade80!important}
.node.faded{opacity:.22;transform:scale(.82);pointer-events:none}
.controls{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;display:flex;gap:10px;background:linear-gradient(transparent,#0a0814 30%);padding-top:40px}
.ctrl-btn{flex:1;padding:13px;border-radius:12px;border:1.5px solid #C8951A55;background:#14101f;color:#9a8a6a;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.ctrl-btn:active{transform:scale(.96)}
.ctrl-btn.primary{border-color:#E8B020;color:#E8B020;background:#1a1000}
@keyframes nodeIn{from{opacity:0;transform:translateY(8px) scale(.85)}to{opacity:1;transform:translateY(0) scale(1)}}
.node{animation:nodeIn .3s ease-out both}
</style>
</head>

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}
function pickPattern(){pattern=PATTERNS[Math.floor(Math.random()*PATTERNS.length)];}

function setLevel(lv){
  level=lv;
  var btns=document.querySelectorAll('.lv-btn');
  for(var i=0;i<btns.length;i++){if(i+1===lv)btns[i].classList.add('on');else btns[i].classList.remove('on');}

}

/* ═══════════════════════════════════
   COMPLETENESS
═══════════════════════════════════ */
function isComplete(){
  var hasSub=false,hasVerb=false;
  for(var i=0;i<chosen.length;i++){
    if(chosen[i].word.s==='subject')hasSub=true;
    if(chosen[i].word.s==='verb')hasVerb=true;
  }
  return hasSub&&hasVerb;
}

/* ═══════════════════════════════════
   CANDIDATES — verb-centered semantic filtering
═══════════════════════════════════ */
function usedSlots(){
  var slots={};
  for(var i=0;i<chosen.length;i++)slots[chosen[i].word.s]=true;
  return slots;
}

function getCandidates(depth){
  if(depth>=MAX_DEPTH[level])return[];
  var possible=T[lastSlot]||T.START;
  if(!possible||possible.length===0)return[];
  var used=usedSlots();
  var noRepeat=['time','subject','qstart','qobject','qend','postverb','degree'];
  var filtered=possible.filter(function(s){
    if(noRepeat.indexOf(s)!==-1&&used[s])return false;
    return true;
  });
  if(filtered.length===0)filtered=possible;
  var pool=W.filter(function(w){
    return w.lv<=level&&filtered.indexOf(w.s)!==-1&&!shownWords[w.t];
  });
  if(pool.length===0){
    pool=W.filter(function(w){return w.lv<=level&&filtered.indexOf(w.s)!==-1;});
  }
  // ── SEMANTIC FILTERING ──
  // Helper: if a category list includes 'th', also match sub-types md/dc/an/lg
  function expandCats(catStr){
    var c=catStr.split(',');
    if(c.indexOf('th')!==-1){['md','dc','an','lg'].forEach(function(x){if(c.indexOf(x)===-1)c.push(x);});}
    return c;
  }
  // Verb restricts which nouns can follow (verb = center of meaning)
  if(lastWord&&lastWord.s==='verb'&&lastWord.va){
    if(lastWord.va==='_'){
      // Intransitive: remove ALL objects, only show postverb/prep/final/etc
      pool=pool.filter(function(w){return w.s!=='object'&&w.s!=='qobject';});
    } else {
      var va=expandCats(lastWord.va);
      var sem=pool.filter(function(w){
        if(w.s!=='object')return true;
        return w.c&&va.indexOf(w.c)!==-1;
      });
      if(sem.length>0)pool=sem;
    }
  }
  // Preposition restricts which nouns can follow
  if(lastWord&&lastWord.s==='preposition'&&lastWord.pa){
    var pa=expandCats(lastWord.pa);
    var sem=pool.filter(function(w){
      if(w.s!=='object')return true;
      return w.c&&pa.indexOf(w.c)!==-1;
    });
    if(sem.length>0)pool=sem;
  }
  // Noun restricts which adjectives can follow
  if(lastWord&&lastWord.s==='object'&&lastWord.c){
    var nc=lastWord.c;
    var ncx=[nc]; if('md,dc,an,lg'.indexOf(nc)!==-1)ncx.push('th');
    var sem=pool.filter(function(w){
      if(w.s!=='adj')return true;
      if(!w.aa)return true;
      var aa=w.aa.split(',');
      for(var k=0;k<ncx.length;k++){if(aa.indexOf(ncx[k])!==-1)return true;}
      return false;
    });
    if(sem.length>0)pool=sem;
  }
  // Always include finals if sentence is complete (user can end anytime)
  if(isComplete()&&pool.length>0){
    var hasFinal=false;
    for(var fi=0;fi<pool.length;fi++){if(pool[fi].s==='final'){hasFinal=true;break;}}
    if(!hasFinal&&filtered.indexOf('final')===-1){
      var finals=W.filter(function(w){return w.s==='final'&&w.lv<=level&&!shownWords[w.t];});
      if(finals.length>0)pool.push(shuffle(finals)[0]);
    }
  }
  var count=pattern[Math.min(depth,pattern.length-1)];
  return shuffle(pool).slice(0,count);
}

/* ═══════════════════════════════════
   RENDER
═══════════════════════════════════ */
var grow=document.getElementById('grow');
var sentDisplay=document.getElementById('sent-display');
var sentBar=document.getElementById('sent-bar');

function renderSentence(){
  var c=isComplete();
  if(c)sentBar.classList.add('complete');else sentBar.classList.remove('complete');
  var h='';
  for(var i=0;i<chosen.length;i++){
    var w=chosen[i].word;
    h+='<div class="sent-word"><span class="sw-t">'+w.t+'</span><span class="sw-p">'+w.p+'</span><span class="sw-e">'+w.e+'</span></div>';
  }
  sentDisplay.innerHTML=h;
  document.getElementById('badge').textContent=c?'valid sentence':'';
}

function createNode(word,depth,idx){
  var el=document.createElement('div');
  el.className='node s-'+word.s;
  el.style.animationDelay=(idx*0.07)+'s';
  el.innerHTML='<div class="nt">'+word.t+'</div><div class="np">'+word.p+'</div><div class="ne">'+word.e+'</div><div class="ns">'+word.s+'</div>';
  el.onclick=function(){tapNode(depth,word,el);};
  return el;
}

function showBranches(depth){
  var cands=getCandidates(depth);
  if(cands.length===0)return;
  var conn=document.createElement('div');conn.className='conn';grow.appendChild(conn);
  var row=document.createElement('div');row.className='depth-row';row.setAttribute('data-depth',depth);
  var rd={depth:depth,nodes:[],savedSlot:lastSlot,savedWord:lastWord};
  for(var i=0;i<cands.length;i++){
    var el=createNode(cands[i],depth,i);
    row.appendChild(el);
    rd.nodes.push({word:cands[i],el:el,state:'active'});
    shownWords[cands[i].t]=true;
  }
  grow.appendChild(row);
  rows.push(rd);
  setTimeout(function(){grow.scrollTop=grow.scrollHeight;},50);
}

function tapNode(depth,word,el){
  var ri=-1;
  for(var i=0;i<rows.length;i++){if(rows[i].depth===depth){ri=i;break;}}
  if(ri===-1)return;
  var row=rows[ri];
  for(var i=0;i<row.nodes.length;i++){
    var n=row.nodes[i];
    n.el.classList.add('revealed');
    if(n.word.t===word.t){n.state='chosen';n.el.classList.add('chosen');n.el.classList.remove('faded');}
    else{n.state='faded';n.el.classList.add('faded');n.el.classList.remove('chosen');}
  }
  while(rows.length>ri+1){
    var rem=rows.pop();
    var re=grow.querySelector('.depth-row[data-depth="'+rem.depth+'"]');
    if(re){if(re.previousElementSibling&&re.previousElementSibling.classList.contains('conn'))re.previousElementSibling.remove();re.remove();}
    for(var j=0;j<rem.nodes.length;j++)delete shownWords[rem.nodes[j].word.t];
  }
  chosen=chosen.filter(function(c){return c.depth<depth;});
  chosen.push({word:word,depth:depth});
  chosen.sort(function(a,b){return a.depth-b.depth;});
  lastSlot=word.s;
  lastWord=word;
  renderSentence();
  showBranches(depth+1);
}

function undo(){
  if(rows.length===0)return;
  var rem=rows.pop();
  var re=grow.querySelector('.depth-row[data-depth="'+rem.depth+'"]');
  if(re){if(re.previousElementSibling&&re.previousElementSibling.classList.contains('conn'))re.previousElementSibling.remove();re.remove();}
  for(var j=0;j<rem.nodes.length;j++)delete shownWords[rem.nodes[j].word.t];
  chosen=chosen.filter(function(c){return c.depth<rem.depth;});
  if(rows.length>0){
    var lr=rows[rows.length-1];
    var ch=null;
    for(var i=0;i<lr.nodes.length;i++){if(lr.nodes[i].state==='chosen'){ch=lr.nodes[i];break;}}
    if(ch){lastSlot=ch.word.s;lastWord=ch.word;}
    else{
      lastSlot=lr.savedSlot;lastWord=lr.savedWord;
      for(var i=0;i<lr.nodes.length;i++){
        lr.nodes[i].state='active';
        lr.nodes[i].el.classList.remove('chosen','faded','revealed');
        (function(n,d){n.el.onclick=function(){tapNode(d,n.word,n.el);};})(lr.nodes[i],lr.depth);
      }
    }
  }else{lastSlot='START';lastWord=null;}
  renderSentence();
}

function reset(){
  chosen=[];rows=[];shownWords={};lastSlot='START';lastWord=null;
  grow.innerHTML='';sentDisplay.innerHTML='';sentBar.classList.remove('complete');
  pickPattern();
  start();
}

function start(){
  var starters=W.filter(function(w){
    return w.lv<=level&&(w.s==='subject'||w.s==='time'||(level>=3&&w.s==='condition')||(level>=2&&w.s==='qstart'));
  });
  var count=pattern[0]||3;
  var picks=shuffle(starters).slice(0,count);
  var row=document.createElement('div');row.className='depth-row';row.setAttribute('data-depth',0);
  var rd={depth:0,nodes:[],savedSlot:'START',savedWord:null};
  for(var i=0;i<picks.length;i++){
    var el=createNode(picks[i],0,i);
    row.appendChild(el);
    rd.nodes.push({word:picks[i],el:el,state:'active'});
    shownWords[picks[i].t]=true;
  }
  grow.appendChild(row);
  rows.push(rd);
}

pickPattern();
start();
</script>
