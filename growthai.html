<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>GrowThai</title>
<style>
:root{
  --bg:#0a0814;
  --root:#E8B020;
  --branch:#c8dce8;
  --branch-dim:#c8dce830;
  --leaf:#6ee87a;
  --complete:#4ade80;
  --text:#f0e8d0;
  --text2:#9a8a6a;
  --phon:#E8B020;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
body{display:flex;flex-direction:column}

.top-bar{padding:14px 16px 10px;text-align:center;flex-shrink:0;border-bottom:1px solid #C8951A33}
.top-bar h1{font-size:18px;font-weight:700;color:var(--root);letter-spacing:.5px}
.top-bar .sub{font-size:11px;color:var(--text2);margin-top:2px}

.sentence-bar{padding:12px 16px;min-height:58px;border-bottom:1px solid #ffffff10;display:flex;align-items:center;flex-wrap:wrap;gap:4px;flex-shrink:0;transition:background .5s}
.sentence-bar.complete{background:#0d1f0d;border-bottom-color:#4ade8033}
.sent-word{display:inline-flex;flex-direction:column;align-items:center;padding:3px 8px;border-radius:8px}
.sent-word .sw-thai{font-size:18px;color:var(--text)}
.sent-word .sw-phon{font-size:9px;color:var(--phon)}
.sent-word .sw-eng{font-size:8px;color:var(--text2)}
.complete-badge{font-size:10px;color:var(--complete);font-weight:700;margin-left:auto;white-space:nowrap;opacity:0;transition:opacity .4s;letter-spacing:.03em}
.sentence-bar.complete .complete-badge{opacity:1}

.grow-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 100px;display:flex;flex-direction:column;align-items:center}

.depth-row{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:6px;position:relative;width:100%}
.connector{width:2px;height:14px;background:var(--branch-dim);flex-shrink:0;margin:0 auto}

.node{position:relative;display:flex;flex-direction:column;align-items:center;padding:14px 16px 10px;border-radius:20px;cursor:pointer;transition:all .3s ease;border:2px solid transparent;min-width:76px;text-align:center;touch-action:manipulation}
.node:active{transform:scale(.94)}
.node .n-thai{font-size:22px;font-weight:600;line-height:1.2}
.node .n-phon{font-size:10px;margin-top:3px;opacity:.8}
.node .n-eng{font-size:9px;margin-top:1px}
.node .n-slot{font-size:7px;text-transform:uppercase;letter-spacing:.1em;margin-top:4px;opacity:.45}

.node.s-subject{background:#2a1800;border-color:#C8951A66}
.node.s-subject .n-thai{color:#E8B020}
.node.s-subject .n-phon{color:#C8951A}
.node.s-subject .n-eng{color:#9a8a6a}

.node.s-time{background:#1a1a08;border-color:#fbbf2444}
.node.s-time .n-thai{color:#fbbf24}
.node.s-time .n-phon{color:#d4a020}
.node.s-time .n-eng{color:#9a8a6a}

.node.s-preverb{background:#1a0820;border-color:#c084fc44}
.node.s-preverb .n-thai{color:#c084fc}
.node.s-preverb .n-phon{color:#a06adc}
.node.s-preverb .n-eng{color:#9a8a6a}

.node.s-verb{background:#081a20;border-color:#60b0e844}
.node.s-verb .n-thai{color:#c8dce8}
.node.s-verb .n-phon{color:#80b0cc}
.node.s-verb .n-eng{color:#9a8a6a}

.node.s-object{background:#0a1a10;border-color:#4ade8044}
.node.s-object .n-thai{color:#6ee87a}
.node.s-object .n-phon{color:#4abe60}
.node.s-object .n-eng{color:#9a8a6a}

.node.s-adj{background:#1a100a;border-color:#fb923c44}
.node.s-adj .n-thai{color:#fb923c}
.node.s-adj .n-phon{color:#d07830}
.node.s-adj .n-eng{color:#9a8a6a}

.node.s-degree{background:#1a100a;border-color:#fb923c33}
.node.s-degree .n-thai{color:#d07830}
.node.s-degree .n-phon{color:#b06020}
.node.s-degree .n-eng{color:#9a8a6a}

.node.s-postverb{background:#101018;border-color:#9090c044}
.node.s-postverb .n-thai{color:#b0b0e0}
.node.s-postverb .n-phon{color:#8888b0}
.node.s-postverb .n-eng{color:#9a8a6a}

.node.s-preposition{background:#0a1820;border-color:#5ac8e844}
.node.s-preposition .n-thai{color:#5ac8e8}
.node.s-preposition .n-phon{color:#40a0c0}
.node.s-preposition .n-eng{color:#9a8a6a}

.node.s-final{background:#200a18;border-color:#e878a844}
.node.s-final .n-thai{color:#e878a8}
.node.s-final .n-phon{color:#c06088}
.node.s-final .n-eng{color:#9a8a6a}

.node.s-conjunction{background:#20180a;border-color:#E8B02066}
.node.s-conjunction .n-thai{color:#E8B020}
.node.s-conjunction .n-phon{color:#C8951A}
.node.s-conjunction .n-eng{color:#9a8a6a}

.node.chosen{transform:scale(1.05);box-shadow:0 0 16px #4ade8030;z-index:2}
.node.chosen.s-subject{border-color:#E8B020}
.node.chosen.s-time{border-color:#fbbf24}
.node.chosen.s-preverb{border-color:#c084fc}
.node.chosen.s-verb{border-color:#60b0e8}
.node.chosen.s-object{border-color:#4ade80}
.node.chosen.s-adj{border-color:#fb923c}
.node.chosen.s-degree{border-color:#fb923c}
.node.chosen.s-postverb{border-color:#9090c0}
.node.chosen.s-preposition{border-color:#5ac8e8}
.node.chosen.s-final{border-color:#e878a8}
.node.chosen.s-conjunction{border-color:#E8B020}

.node.faded{opacity:.25;transform:scale(.82);pointer-events:none}

.controls{position:fixed;bottom:0;left:0;right:0;padding:12px 16px;display:flex;gap:10px;background:linear-gradient(transparent,var(--bg) 30%);padding-top:40px}
.ctrl-btn{flex:1;padding:13px;border-radius:12px;border:1.5px solid #C8951A55;background:#14101f;color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .15s}
.ctrl-btn:active{transform:scale(.96)}
.ctrl-btn.primary{border-color:var(--root);color:var(--root);background:#1a1000}

@keyframes nodeIn{from{opacity:0;transform:translateY(8px) scale(.85)}to{opacity:1;transform:translateY(0) scale(1)}}
.node{animation:nodeIn .3s ease-out both}
</style>
</head>

/* ═══════════════════════════════════════════
   GRAMMAR STATE MACHINE
   ═══════════════════════════════════════════ */
function freshClause(){
  return {hasSubject:false, hasTime:false, needsVerb:false, hasVerb:false, hasObject:false, hasAdj:false, hasPostverb:false, needsPrepObj:false, hasPrepPhrase:false, hasFinal:false};
}

function getValidSlots(cl){
  // DEBTS first — must be resolved
  if(cl.needsVerb) return ['verb'];
  if(cl.needsPrepObj) return ['object'];

  // After final particle, only allow conjunction to extend
  if(cl.hasFinal) return ['conjunction'];

  var slots = [];

  // Beginning of clause: subject and time
  if(!cl.hasSubject && !cl.hasVerb) slots.push('subject');
  if(!cl.hasTime && !cl.hasVerb) slots.push('time');

  // If we have time but no subject, need subject
  if(cl.hasTime && !cl.hasSubject && !cl.hasVerb) slots.push('subject');

  // Subject present, no verb yet: offer preverb and verb
  if(cl.hasSubject && !cl.hasVerb){
    slots.push('preverb','verb');
  }

  // Verb present: many options
  if(cl.hasVerb){
    if(!cl.hasObject) slots.push('object');
    if(!cl.hasAdj) slots.push('adj');
    if(!cl.hasPostverb) slots.push('postverb');
    if(!cl.hasPrepPhrase) slots.push('preposition');
    slots.push('final');
    slots.push('conjunction');
  }

  // After object, can add adj modifying it
  if(cl.hasObject && !cl.hasAdj) slots.push('adj');

  // Deduplicate
  var seen = {};
  return slots.filter(function(s){if(seen[s])return false;seen[s]=true;return true;});
}

/* Branch count per depth (Fibonacci-inspired, depth 0 = 3 per user spec) */
var BRANCH = [3, 2, 3, 3, 5, 5, 5, 5, 5, 5, 5, 5];

/* ═══════════════════════════════════════════
   APP STATE
   ═══════════════════════════════════════════ */
var chosen = [];     // [{word, depth}]
var rows = [];       // [{depth, nodes:[{word,el,state}]}]
var usedWords = {};
var clause = freshClause();
var clauseStack = []; // for conjunctions: save previous clause state

function shuffle(a){var b=a.slice();for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}return b;}

/* ═══════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════ */
var growArea = document.getElementById('grow-area');
var sentDisplay = document.getElementById('sentence-display');
var sentBar = document.getElementById('sentence-bar');

function isComplete(){
  // Need at least subject + verb across all clauses
  var words = chosen.map(function(c){return c.word;});
  var hasSub=false, hasVerb=false;
  for(var i=0;i<words.length;i++){
    if(words[i].s==='subject') hasSub=true;
    if(words[i].s==='verb') hasVerb=true;
  }
  return hasSub && hasVerb;
}

function renderSentence(){
  var complete = isComplete();
  if(complete) sentBar.classList.add('complete'); else sentBar.classList.remove('complete');
  var html='';
  for(var i=0;i<chosen.length;i++){
    var w=chosen[i].word;
    html+='<div class="sent-word"><span class="sw-thai">'+w.t+'</span><span class="sw-phon">'+w.p+'</span><span class="sw-eng">'+w.e+'</span></div>';
  }
  sentDisplay.innerHTML=html;
  document.getElementById('complete-badge').textContent=complete?'valid sentence':'';
}

function getCandidates(depth){
  var validSlots = getValidSlots(clause);
  if(validSlots.length===0) return [];

  var pool = W.filter(function(w){
    return validSlots.indexOf(w.s)!==-1 && !usedWords[w.t];
  });
  // Fallback: allow reuse if pool is empty
  if(pool.length===0){
    pool = W.filter(function(w){return validSlots.indexOf(w.s)!==-1;});
  }

  var count = BRANCH[Math.min(depth, BRANCH.length-1)];
  return shuffle(pool).slice(0, count);
}

function createNodeEl(word, depth, index){
  var el=document.createElement('div');
  el.className='node s-'+word.s;
  el.style.animationDelay=(index*0.07)+'s';
  el.innerHTML='<div class="n-thai">'+word.t+'</div><div class="n-phon">'+word.p+'</div><div class="n-eng">'+word.e+'</div><div class="n-slot">'+word.s+'</div>';
  el.onclick=function(){selectNode(depth,word,el);};
  return el;
}

function showBranches(depth){
  var candidates=getCandidates(depth);
  if(candidates.length===0) return;

  var conn=document.createElement('div');
  conn.className='connector';
  growArea.appendChild(conn);

  var row=document.createElement('div');
  row.className='depth-row';
  row.setAttribute('data-depth',depth);

  var rowData={depth:depth, nodes:[], clauseSnapshot:JSON.parse(JSON.stringify(clause)), clauseStackSnapshot:JSON.parse(JSON.stringify(clauseStack))};

  for(var i=0;i<candidates.length;i++){
    var el=createNodeEl(candidates[i],depth,i);
    row.appendChild(el);
    rowData.nodes.push({word:candidates[i],el:el,state:'active'});
  }

  growArea.appendChild(row);
  rows.push(rowData);
  setTimeout(function(){growArea.scrollTop=growArea.scrollHeight;},50);
}

function applyWord(word){
  // Update clause state based on word slot
  switch(word.s){
    case 'subject': clause.hasSubject=true; break;
    case 'time': clause.hasTime=true; break;
    case 'preverb': clause.needsVerb=true; break;
    case 'verb': clause.hasVerb=true; clause.needsVerb=false; break;
    case 'object': clause.hasObject=true; clause.needsPrepObj=false; break;
    case 'adj': clause.hasAdj=true; break;
    case 'degree': break;
    case 'postverb': clause.hasPostverb=true; break;
    case 'preposition': clause.needsPrepObj=true; break;
    case 'final': clause.hasFinal=true; break;
    case 'conjunction':
      clauseStack.push(JSON.parse(JSON.stringify(clause)));
      clause=freshClause();
      break;
  }
}

function selectNode(depth,word,el){
  var rowIdx=-1;
  for(var i=0;i<rows.length;i++){if(rows[i].depth===depth){rowIdx=i;break;}}
  if(rowIdx===-1)return;
  var row=rows[rowIdx];

  // Fade siblings, highlight chosen
  for(var i=0;i<row.nodes.length;i++){
    var n=row.nodes[i];
    if(n.word.t===word.t){n.state='chosen';n.el.classList.add('chosen');n.el.classList.remove('faded');}
    else{n.state='faded';n.el.classList.add('faded');n.el.classList.remove('chosen');}
  }

  // Remove deeper rows
  while(rows.length>rowIdx+1){
    var removed=rows.pop();
    var rowEl=growArea.querySelector('.depth-row[data-depth="'+removed.depth+'"]');
    if(rowEl){
      if(rowEl.previousElementSibling&&rowEl.previousElementSibling.classList.contains('connector'))rowEl.previousElementSibling.remove();
      rowEl.remove();
    }
    for(var j=0;j<removed.nodes.length;j++)delete usedWords[removed.nodes[j].word.t];
  }

  // Restore clause state to this row's snapshot, then apply this word
  clause=JSON.parse(JSON.stringify(row.clauseSnapshot));
  clauseStack=JSON.parse(JSON.stringify(row.clauseStackSnapshot));

  // Rebuild chosen list up to this depth
  chosen=chosen.filter(function(c){return c.depth<depth;});
  chosen.push({word:word,depth:depth});
  chosen.sort(function(a,b){return a.depth-b.depth;});
  usedWords[word.t]=true;

  applyWord(word);
  renderSentence();

  // Show next branches
  showBranches(depth+1);
}

function undoLast(){
  if(rows.length===0)return;
  var removed=rows.pop();
  var rowEl=growArea.querySelector('.depth-row[data-depth="'+removed.depth+'"]');
  if(rowEl){
    if(rowEl.previousElementSibling&&rowEl.previousElementSibling.classList.contains('connector'))rowEl.previousElementSibling.remove();
    rowEl.remove();
  }
  for(var j=0;j<removed.nodes.length;j++)delete usedWords[removed.nodes[j].word.t];
  chosen=chosen.filter(function(c){return c.depth<removed.depth;});

  // Restore clause state
  if(rows.length>0){
    var lastRow=rows[rows.length-1];
    // Find the chosen node in last row and restore state after it
    var chosenNode=null;
    for(var i=0;i<lastRow.nodes.length;i++){
      if(lastRow.nodes[i].state==='chosen'){chosenNode=lastRow.nodes[i];break;}
    }
    if(chosenNode){
      clause=JSON.parse(JSON.stringify(lastRow.clauseSnapshot));
      clauseStack=JSON.parse(JSON.stringify(lastRow.clauseStackSnapshot));
      applyWord(chosenNode.word);
    }
  } else {
    clause=freshClause();
    clauseStack=[];
  }

  // Re-activate last row's nodes if no chosen node
  if(rows.length>0){
    var lr=rows[rows.length-1];
    var hasChosen=false;
    for(var i=0;i<lr.nodes.length;i++){if(lr.nodes[i].state==='chosen')hasChosen=true;}
    if(!hasChosen){
      for(var i=0;i<lr.nodes.length;i++){
        lr.nodes[i].state='active';
        lr.nodes[i].el.classList.remove('chosen','faded');
        (function(n,d){n.el.onclick=function(){selectNode(d,n.word,n.el);};})(lr.nodes[i],lr.depth);
      }
      clause=JSON.parse(JSON.stringify(lr.clauseSnapshot));
      clauseStack=JSON.parse(JSON.stringify(lr.clauseStackSnapshot));
    }
  }

  renderSentence();
}

function resetGrow(){
  chosen=[];rows=[];usedWords={};clause=freshClause();clauseStack=[];
  growArea.innerHTML='';sentDisplay.innerHTML='';sentBar.classList.remove('complete');
  startTree();
}

function startTree(){
  // Depth 0: 3 random options from subjects + time words
  var starters=W.filter(function(w){return w.s==='subject'||w.s==='time';});
  var picks=shuffle(starters).slice(0,3);

  var row=document.createElement('div');
  row.className='depth-row';
  row.setAttribute('data-depth',0);
  var rowData={depth:0,nodes:[],clauseSnapshot:JSON.parse(JSON.stringify(clause)),clauseStackSnapshot:[]};

  for(var i=0;i<picks.length;i++){
    var el=createNodeEl(picks[i],0,i);
    row.appendChild(el);
    rowData.nodes.push({word:picks[i],el:el,state:'active'});
  }
  growArea.appendChild(row);
  rows.push(rowData);
}

startTree();
</script>
